<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1.10.4 监管动态与合规参考</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}
.modal {
  background: #fff;
  border-radius: 16px;
  max-width: 580px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  animation: slideUp 0.3s ease;
}
@keyframes slideUp {
  from { transform: translateY(30px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
.modal-header {
  background: linear-gradient(135deg, #1890ff, #0d6efd);
  color: #fff;
  padding: 24px 28px;
  border-radius: 16px 16px 0 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.modal-header h2 {
  font-size: 20px;
  font-weight: 600;
}
.close-btn {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  border: none;
  color: #fff;
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
}
.close-btn:hover { background: rgba(255,255,255,0.35); }
.modal-body { padding: 28px; }
.section-title {
  font-size: 15px;
  font-weight: 600;
  color: #333;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.pdf-box {
  background: #f0f7ff;
  border: 1px solid #91cfff;
  border-radius: 12px;
  padding: 20px;
  text-align: center;
  margin-bottom: 24px;
}
.pdf-box p {
  font-size: 15px;
  color: #333;
  margin-bottom: 16px;
  line-height: 1.6;
}
.download-btn {
  display: inline-block;
  padding: 13px 28px;
  background: #1890ff;
  color: #fff;
  text-decoration: none;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 600;
  transition: background 0.2s, transform 0.15s;
  cursor: pointer;
  border: none;
}
.download-btn:hover { background: #40a9ff; transform: translateY(-1px); }
.hint {
  font-size: 13px;
  color: #888;
  margin-top: 10px;
}
.divider {
  height: 1px;
  background: #f0f0f0;
  margin: 24px 0;
}
.org-list { list-style: none; }
.org-list li { margin-bottom: 12px; }
.org-list li:last-child { margin-bottom: 0; }
.org-link {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  background: #fafafa;
  border-radius: 10px;
  text-decoration: none;
  color: #333;
  font-size: 14px;
  transition: background 0.2s, box-shadow 0.2s;
  border: 1px solid transparent;
}
.org-link:hover {
  background: #e6f7ff;
  border-color: #91cfff;
  box-shadow: 0 2px 8px rgba(24,144,255,0.12);
}
.org-icon {
  width: 36px; height: 36px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.org-info { flex: 1; }
.org-name { font-weight: 600; margin-bottom: 2px; }
.org-url { font-size: 12px; color: #999; }
.arrow { color: #ccc; font-size: 18px; }
</style>
</head>
<body>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2>📋 1.10.4 监管动态与合规参考</h2>
      <button class="close-btn" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="pdf-box">
        <p><strong>📄 资遇代理人合规要点与监管新动态（2025年5月）</strong></p>
        <a href="素材库/合规相关/资遇代理人合规要点与监管新动态 (0515).pdf"
           target="_blank"
           class="download-btn"
           onclick="trackDownload()">
          📥 下载PDF查阅
        </a>
        <p class="hint">点击上方按钮下载或在新窗口中打开PDF文件</p>
      </div>

      <div class="divider"></div>

      <div class="section-title">🏛️ 相关监管机构</div>
      <ul class="org-list">
        <li>
          <a href="https://www.ia.org.hk" target="_blank" class="org-link">
            <div class="org-icon" style="background:#e6f0ff;">🏦</div>
            <div class="org-info">
              <div class="org-name">保险业监管局（IA）</div>
              <div class="org-url">www.ia.org.hk</div>
            </div>
            <span class="arrow">↗</span>
          </a>
        </li>
        <li>
          <a href="https://www.hkfi.org.hk" target="_blank" class="org-link">
            <div class="org-icon" style="background:#fff3e6;">🔗</div>
            <div class="org-info">
              <div class="org-name">香港保险业联会（HKFI）</div>
              <div class="org-url">www.hkfi.org.hk</div>
            </div>
            <span class="arrow">↗</span>
          </a>
        </li>
        <li>
          <a href="https://www.fatf-gafi.org" target="_blank" class="org-link">
            <div class="org-icon" style="background:#e8f8e8;">🌍</div>
            <div class="org-info">
              <div class="org-name">财务行动特别工作组（FATF）</div>
              <div class="org-url">www.fatf-gafi.org</div>
            </div>
            <span class="arrow">↗</span>
          </a>
        </li>
      </ul>
    </div>
  </div>
</div>

<script>
function closeModal() {
  document.getElementById('modalOverlay').style.display = 'none';
}
function trackDownload() {
  console.log('PDF download clicked');
}
// Close on overlay click
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
// Close on Escape key
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});
</script>
</body>
</html>
