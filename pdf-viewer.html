<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title id="page-title">PDF 预览</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e; color: #fff; min-height: 100vh;
    }
    .header {
      position: fixed; top: 0; left: 0; right: 0; height: 56px;
      background: rgba(26,26,46,0.95); backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .header .back { color: #4a9eff; font-size: 16px; cursor: pointer; text-decoration: none; }
    .header .title { font-size: 17px; font-weight: 600; flex: 1; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 10px; }
    .header .dl-btn { background: #4a9eff; color: #fff; border: none; padding: 6px 14px; border-radius: 6px; font-size: 14px; cursor: pointer; }

    #preview-frame {
      position: fixed; top: 56px; left: 0; right: 0; bottom: 0;
      width: 100%; border: none; background: #fff;
    }

    .download-card {
      display: none; /* 默认隐藏，电脑浏览器直接用 iframe 预览 */
    </style>
</head>
<body>

  <div class="header">
    <a href="javascript:void(0)" onclick="goBack()" class="back">← 返回</a>
    <div class="title" id="doc-title">PDF 预览</div>
    <button class="dl-btn" id="dl-btn" onclick="downloadFile()">下载</button>
  </div>

  <!-- 电脑浏览器：用 iframe 直接预览 PDF -->
  <iframe id="preview-frame" sandbox="allow-same-origin allow-scripts allow-forms allow-popups"></iframe>

  <script>
    var urlParams = new URLSearchParams(window.location.search);
    var PDF_URL = urlParams.get('url') || '';
    var PAGE_TITLE = decodeURIComponent(urlParams.get('title') || '文档');

    document.getElementById('page-title').textContent = PAGE_TITLE + ' - PDF 预览';
    document.getElementById('doc-title').textContent = PAGE_TITLE;

    function goBack() {
      if (document.referrer && document.referrer.indexOf(window.location.hostname) !== -1) {
        history.back();
      } else {
        window.close();
      }
    }

    function downloadFile() {
      window.open(PDF_URL, '_blank');
    }

    if (!PDF_URL) {
      document.getElementById('preview-frame').style.display = 'none';
      document.body.innerHTML += '<div style="padding:56px 20px 20px;color:#ff6b6b;text-align:center">错误：未指定 PDF 地址</div>';
    } else {
      // 优先用 iframe 预览（电脑浏览器）
      document.getElementById('preview-frame').src = PDF_URL;

      // 检测是否为手机微信环境
      var ua = navigator.userAgent.toLowerCase();
      var isMobile = /android|iphone|ipad|ipod|micromessenger|mobile/i.test(ua);

      if (isMobile) {
        // 手机/微信：iframe 可能无法预览，直接显示下载提示
        document.getElementById('preview-frame').style.display = 'none';
        document.body.innerHTML +=
          '<div style="padding:80px 20px 20px;text-align:center">' +
          '<div style="font-size:80px;margin-bottom:20px">📄</div>' +
          '<div style="font-size:20px;font-weight:600;margin-bottom:12px">' + PAGE_TITLE + '</div>' +
          '<div style="font-size:14px;color:#888;margin-bottom:30px">点击下方按钮下载或用浏览器打开</div>' +
          '<a href="' + PDF_URL + '" download="' + PAGE_TITLE + '.pdf" style="display:block;background:#4a9eff;color:#fff;text-decoration:none;padding:16px;border-radius:12px;font-size:17px;font-weight:600;margin:0 20px">🔽 下载 PDF</a>' +
          '<div style="margin-top:20px;font-size:13px;color:#666;line-height:1.8;padding:0 30px">' +
          '💡 若无法下载：点右上角 ┆ → 复制链接 → 用 Safari/Chrome 打开' +
          '</div>' +
          '</div>';
      }
    }
  </script>

</body>
</html>
