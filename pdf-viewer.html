<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PDF 查看 | 恒玥 Yuanguard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a1528;
    color: #f5f0e6;
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* 顶部工具栏 */
  .toolbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: linear-gradient(135deg, #030d1e 0%, #071a38 50%, #1e3a8a 100%);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    border-bottom: 1px solid rgba(37,99,235,0.3);
  }
  .toolbar-back {
    font-size: 20px;
    cursor: pointer;
    text-decoration: none;
    color: #f5f0e6;
    padding: 6px;
    border-radius: 8px;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .toolbar-back:hover, .toolbar-back:active {
    background: rgba(255,255,255,0.1);
  }
  .toolbar-title {
    flex: 1;
    font-size: 15px;
    font-weight: 700;
    color: #f5f0e6;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .toolbar-title span { color: #c9a84c; }

  .btn-download {
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: linear-gradient(135deg, #e8b020, #a37812);
    color: #0a1528;
    border: none;
    border-radius: 10px;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
    text-decoration: none;
    box-shadow: 0 4px 14px rgba(232,176,32,0.4);
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-download:hover, .btn-download:active {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(232,176,32,0.6);
  }

  /* PDF 提示区域 */
  .pdf-hint {
    background: rgba(201,168,76,0.08);
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 10px;
    padding: 10px 16px;
    margin: 14px 16px 8px;
    font-size: 12px;
    color: #c9a84c;
    text-align: center;
    font-weight: 600;
  }

  /* PDF 容器 */
  .pdf-container {
    flex: 1;
    padding: 0 16px 16px;
    display: flex;
    flex-direction: column;
  }

  .pdf-wrapper {
    flex: 1;
    border-radius: 12px;
    overflow: hidden;
    background: rgba(2,8,20,0.9);
    border: 1.5px solid rgba(37,99,235,0.2);
    min-height: 60vh;
  }

  .pdf-wrapper iframe {
    width: 100%;
    height: 100%;
    min-height: 70vh;
    border: none;
    display: block;
  }

  /* 底部版权 */
  .footer {
    text-align: center;
    padding: 14px;
    font-size: 11px;
    color: #6b7280;
    font-weight: 600;
    letter-spacing: 0.5px;
    border-top: 1px solid rgba(37,99,235,0.1);
  }
  .footer span { color: #c9a84c; }

  @media (max-width: 600px) {
    .toolbar { padding: 12px 14px; }
    .btn-download { padding: 7px 12px; font-size: 12px; }
  }
</style>
</head>
<body>

<div class="toolbar">
  <a href="javascript:history.back()" class="toolbar-back">←</a>
  <div class="toolbar-title">📄 <span>PDF 查看</span></div>
  <a id="downloadBtn" href="#" download class="btn-download" target="_blank">📥 下载保存</a>
</div>

<div class="pdf-hint" id="hint">
  ⬇️ 如无法直接查看，请点击上方「下载保存」按钮保存文件
</div>

<div class="pdf-container">
  <div class="pdf-wrapper">
    <iframe id="pdfFrame" src="" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
  </div>
</div>

<div class="footer">
  恒玥 Yuanguard · IFA独立理财顾问服务 · <span>YUEGUARD</span>
</div>

<script>
(function() {
  // 从 URL 参数获取 PDF 路径
  const params = new URLSearchParams(window.location.search);
  const pdfPath = params.get('file') || '';

  if (!pdfPath) {
    document.getElementById('pdfFrame').srcdoc = '<html><body style="background:#0a1528;color:#888;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;"><p>未指定 PDF 文件</p><a href="javascript:history.back()" style="color:#c9a84c;font-size:14px;">← 返回上一页</a></body></html>';
    document.getElementById('downloadBtn').style.display = 'none';
    return;
  }

  // 设置 iframe 嵌入 PDF
  document.getElementById('pdfFrame').src = decodeURIComponent(pdfPath);

  // 设置下载按钮
  const decodedPath = decodeURIComponent(pdfPath);
  document.getElementById('downloadBtn').href = decodedPath;

  // 从路径提取文件名显示在标题
  const fileName = decodedPath.split('/').pop().split('?')[0] || 'PDF文件';
  document.querySelector('.toolbar-title span').textContent = fileName;
  document.title = fileName + ' | 恒玥 Yuanguard';
})();
</script>

</body>
</html>
