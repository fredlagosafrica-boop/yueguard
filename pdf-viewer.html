<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PDF 预览</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #1a1a2e; color: #fff; min-height: 100vh; }

    .header {
      position: fixed; top: 0; left: 0; right: 0; height: 56px;
      background: rgba(26,26,46,0.95); backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .header .back { color: #4a9eff; font-size: 16px; cursor: pointer; text-decoration: none; padding: 8px 0; }
    .header .title { font-size: 17px; font-weight: 600; flex: 1; text-align: center; }
    .header .dl-btn { background: #4a9eff; color: #fff; border: none; padding: 6px 14px; border-radius: 6px; font-size: 14px; cursor: pointer; }

    #pdf-container { padding-top: 56px; display: flex; flex-direction: column; align-items: center; }
    #canvas-container { width: 100%; max-width: 900px; margin: 16px 0; background: #fff; box-shadow: 0 4px 20px rgba(0,0,0,0.3); display: flex; flex-direction: column; align-items: center; }
    canvas { display: block; max-width: 100%; }

    .controls { display: flex; gap: 10px; padding: 16px; flex-wrap: wrap; justify-content: center; align-items: center; }
    .controls button { background: #2a2a4e; color: #fff; border: 1px solid rgba(255,255,255,0.2); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; min-width: 44px; }
    .controls button:hover { background: #3a3a6e; }
    .controls button:disabled { opacity: 0.4; cursor: not-allowed; }
    .controls .page-num { color: #aaa; font-size: 14px; min-width: 80px; text-align: center; }
    .controls .zoom-btns { display: flex; gap: 6px; }

    .loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; color: #aaa; z-index: 999; }
    .loading .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #4a9eff; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; color: #ff6b6b; padding: 20px; white-space: pre-wrap; font-size: 14px; z-index: 999; }

    @media (max-width: 600px) {
      #canvas-container { margin: 8px; }
      .header .title { font-size: 15px; }
    }
  </style>
</head>
<body>

  <div class="header">
    <a href="javascript:void(0)" onclick="goBack()" class="back">← 返回</a>
    <div class="title" id="doc-title">PDF 预览</div>
    <button class="dl-btn" id="dl-btn">下载 PDF</button>
  </div>

  <div id="pdf-container">
    <div id="canvas-container"><canvas id="pdf-canvas"></canvas></div>
    <div class="controls">
      <button id="prev-btn" onclick="prevPage()">◀</button>
      <span class="page-num" id="page-info">- / -</span>
      <button id="next-btn" onclick="nextPage()">▶</button>
      <div class="zoom-btns">
        <button onclick="zoomOut()">A-</button>
        <button onclick="zoomIn()">A+</button>
      </div>
      <button onclick="downloadPDF()">💾 下载</button>
    </div>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div>正在加载 PDF...</div>
  </div>

  <div class="error-msg" id="error" style="display:none"></div>

  <!-- PDF.js -->
  <script src="https://cdn.bootcdn.net/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdn.bootcdn.net/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    // ========== 参数配置 ==========
    // 使用方法：pdf-viewer.html?url=PDF地址&title=标题
    var urlParams = new URLSearchParams(window.location.search);
    var PDF_URL = urlParams.get('url') || '';
    var PAGE_TITLE = decodeURIComponent(urlParams.get('title') || '文档');
    // ==============================

    document.getElementById('doc-title').textContent = PAGE_TITLE;
    document.getElementById('dl-btn').textContent = PAGE_TITLE + '.pdf';

    var pdfDoc = null, currentPage = 1, totalPages = 0, scale = 1.5;
    var canvas = document.getElementById('pdf-canvas');
    var ctx = canvas.getContext('2d');

    function goBack() {
      if (document.referrer && document.referrer.indexOf(window.location.hostname) !== -1) {
        history.back();
      } else {
        window.close();
      }
    }

    function showPage(num) {
      if (!pdfDoc || num < 1 || num > totalPages) return;
      currentPage = num;
      pdfDoc.getPage(num).then(function(page) {
        var viewport = page.getViewport({ scale: scale });
        // 适配移动端宽度
        var containerW = document.getElementById('canvas-container').clientWidth - 16;
        if (viewport.width > containerW) {
          scale = containerW / page.getViewport({scale: 1}).width;
          viewport = page.getViewport({ scale: scale });
        }
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        canvas.style.width = viewport.width + 'px';
        canvas.style.height = viewport.height + 'px';
        page.render({ canvasContext: ctx, viewport: viewport }).promise;
        document.getElementById('page-info').textContent = currentPage + ' / ' + totalPages;
        document.getElementById('prev-btn').disabled = (currentPage <= 1);
        document.getElementById('next-btn').disabled = (currentPage >= totalPages);
      });
    }

    function prevPage() { showPage(currentPage - 1); }
    function nextPage() { showPage(currentPage + 1); }
    function zoomIn() { scale = Math.min(scale + 0.3, 5); showPage(currentPage); }
    function zoomOut() { scale = Math.max(scale - 0.3, 0.3); showPage(currentPage); }

    // 微信内下载：创建隐藏 iframe 直接下载
    function downloadPDF() {
      var a = document.createElement('a');
      a.href = PDF_URL;
      a.download = PAGE_TITLE + '.pdf';
      a.target = '_blank';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    document.getElementById('dl-btn').addEventListener('click', downloadPDF);

    if (!PDF_URL) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'block';
      document.getElementById('error').textContent = '错误：未指定 PDF 地址\n\n请使用：\npdf-viewer.html?url=PDF链接&title=标题';
    } else {
      pdfjsLib.getDocument(PDF_URL).promise
        .then(function(doc) {
          pdfDoc = doc; totalPages = doc.numPages;
          document.getElementById('loading').style.display = 'none';
          showPage(1);
        })
        .catch(function(err) {
          document.getElementById('loading').style.display = 'none';
          document.getElementById('error').style.display = 'block';
          document.getElementById('error').textContent = 'PDF 加载失败：\n' + err.message;
        });
    }
  </script>
</body>
</html>
