<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PDF 查看 | 恒玥 Yuanguard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a1528;
    color: #f5f0e6;
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* 顶部工具栏 */
  .toolbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: linear-gradient(135deg, #030d1e 0%, #071a38 50%, #1e3a8a 100%);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    border-bottom: 1px solid rgba(37,99,235,0.3);
  }
  .toolbar-back {
    font-size: 20px;
    cursor: pointer;
    text-decoration: none;
    color: #f5f0e6;
    padding: 6px;
    border-radius: 8px;
    transition: background 0.2s;
    flex-shrink: 0;
    user-select: none;
  }
  .toolbar-back:active { background: rgba(255,255,255,0.15); }
  .toolbar-title {
    flex: 1;
    font-size: 15px;
    font-weight: 700;
    color: #f5f0e6;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .toolbar-title span { color: #c9a84c; }

  .btn-download {
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: linear-gradient(135deg, #e8b020, #a37812);
    color: #0a1528;
    border: none;
    border-radius: 10px;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
    text-decoration: none;
    box-shadow: 0 4px 14px rgba(232,176,32,0.4);
    transition: all 0.2s;
    white-space: nowrap;
    user-select: none;
  }
  .btn-download:active {
    transform: scale(0.96);
    box-shadow: 0 2px 8px rgba(232,176,32,0.3);
  }

  /* 提示条 */
  .hint-bar {
    background: rgba(201,168,76,0.08);
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 10px;
    padding: 10px 16px;
    margin: 14px 16px 0;
    font-size: 12px;
    color: #c9a84c;
    text-align: center;
    font-weight: 600;
    display: none;
  }
  .hint-bar.show { display: block; }

  /* 微信引导面板 */
  .wechat-guide {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    padding: 40px 30px;
    text-align: center;
    gap: 20px;
  }
  .wechat-guide.show { display: flex; }

  .wechat-guide-icon {
    font-size: 56px;
    line-height: 1;
    filter: drop-shadow(0 4px 20px rgba(201,168,76,0.4));
  }
  .wechat-guide h2 {
    font-size: 20px;
    font-weight: 800;
    color: #f5f0e6;
    line-height: 1.4;
  }
  .wechat-guide p {
    font-size: 14px;
    color: #9ca3af;
    line-height: 1.8;
    font-weight: 600;
    max-width: 320px;
  }
  .wechat-guide .highlight {
    color: #c9a84c;
    font-weight: 800;
  }
  .guide-step {
    display: flex;
    align-items: center;
    gap: 14px;
    background: rgba(30,58,138,0.15);
    border: 1px solid rgba(37,99,235,0.2);
    border-radius: 12px;
    padding: 14px 18px;
    width: 100%;
    max-width: 340px;
    font-size: 14px;
    font-weight: 700;
    color: #f5f0e6;
    text-align: left;
  }
  .guide-step-num {
    width: 28px;
    height: 28px;
    background: linear-gradient(135deg, #e8b020, #a37812);
    color: #0a1528;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 900;
    flex-shrink: 0;
  }
  .open-browser-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, #e8b020, #a37812);
    color: #0a1528;
    border: none;
    border-radius: 12px;
    padding: 14px 28px;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    text-decoration: none;
    box-shadow: 0 6px 24px rgba(232,176,32,0.45);
    transition: all 0.2s;
    margin-top: 4px;
  }
  .open-browser-btn:active {
    transform: scale(0.96);
  }

  /* 正常预览区 */
  .pdf-container {
    flex: 1;
    padding: 12px 16px 16px;
    display: flex;
    flex-direction: column;
  }
  .pdf-wrapper {
    flex: 1;
    border-radius: 12px;
    overflow: hidden;
    background: rgba(2,8,20,0.9);
    border: 1.5px solid rgba(37,99,235,0.2);
    min-height: 55vh;
  }
  .pdf-wrapper iframe {
    width: 100%;
    height: 100%;
    min-height: 55vh;
    border: none;
    display: block;
  }

  /* 底部 */
  .footer {
    text-align: center;
    padding: 12px;
    font-size: 11px;
    color: #6b7280;
    font-weight: 600;
    letter-spacing: 0.5px;
    border-top: 1px solid rgba(37,99,235,0.1);
  }
  .footer span { color: #c9a84c; }

  @media (max-width: 600px) {
    .toolbar { padding: 12px 14px; }
    .btn-download { padding: 7px 12px; font-size: 12px; }
    .pdf-container { padding: 10px 14px 14px; }
  }
</style>
</head>
<body>

<div class="toolbar">
  <a href="javascript:history.back()" class="toolbar-back">←</a>
  <div class="toolbar-title">📄 <span>PDF 查看</span></div>
  <a id="downloadBtn" href="#" download class="btn-download" target="_blank">📥 下载保存</a>
</div>

<div class="hint-bar" id="hintBar">
  ⬇️ 如无法查看或下载，请点击右上角 <strong>···</strong> 选择「在浏览器打开」
</div>

<!-- 微信引导面板 -->
<div class="wechat-guide" id="wechatGuide">
  <div class="wechat-guide-icon">📱</div>
  <h2>微信内置浏览器<br>无法直接下载文件</h2>
  <p>请点击右上角 <span class="highlight">···</span> 菜单<br>选择 <span class="highlight">「在浏览器打开」</span><br>即可下载保存文件</p>

  <div class="guide-step">
    <div class="guide-step-num">①</div>
    <span>点击页面右上角 <strong>···</strong> 菜单</span>
  </div>
  <div class="guide-step">
    <div class="guide-step-num">②</div>
    <span>找到并点击 <strong>「在浏览器打开」</strong></span>
  </div>
  <div class="guide-step">
    <div class="guide-step-num">③</div>
    <span>在浏览器中点击 <strong>下载按钮</strong> 保存</span>
  </div>

  <a id="openBrowserBtn" href="#" class="open-browser-btn">🔗 尝试直接用浏览器打开</a>
</div>

<!-- 正常 PDF 预览 -->
<div class="pdf-container" id="pdfContainer">
  <div class="pdf-wrapper">
    <iframe id="pdfFrame" src="" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
  </div>
</div>

<div class="footer">
  恒玥 Yuanguard · IFA独立理财顾问服务 · <span>YUEGUARD</span>
</div>

<script>
(function() {
  // 检测微信内置浏览器
  var ua = navigator.userAgent.toLowerCase();
  var isWeChat = /micromessenger|wechat/.test(ua) && !/wework/.test(ua);

  var params = new URLSearchParams(window.location.search);
  var pdfPath = params.get('file') || '';
  var decodedPath = pdfPath ? decodeURIComponent(pdfPath) : '';
  var fileName = decodedPath.split('/').pop().split('?')[0] || 'PDF文件';

  if (!pdfPath) {
    document.getElementById('pdfFrame').srcdoc = '<html><body style="background:#0a1528;color:#888;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;text-align:center;"><p>未指定 PDF 文件</p><a href="javascript:history.back()" style="color:#c9a84c;font-size:14px;">← 返回上一页</a></body></html>';
    document.getElementById('downloadBtn').style.display = 'none';
    return;
  }

  // 设置下载按钮
  document.getElementById('downloadBtn').href = decodedPath;
  document.getElementById('openBrowserBtn').href = decodedPath;
  document.querySelector('.toolbar-title span').textContent = fileName;
  document.title = fileName + ' | 恒玥 Yuanguard';

  if (isWeChat) {
    // 微信环境：显示引导面板，隐藏 PDF 预览
    document.getElementById('wechatGuide').classList.add('show');
    document.getElementById('pdfContainer').style.display = 'none';
    document.getElementById('hintBar').classList.remove('show');
    document.getElementById('downloadBtn').style.display = 'none';
    document.getElementById('toolbar-title').querySelector('span').textContent = fileName;
  } else {
    // 非微信：直接显示 PDF 预览
    document.getElementById('wechatGuide').classList.remove('show');
    document.getElementById('pdfContainer').style.display = 'flex';
    document.getElementById('hintBar').classList.add('show');
    document.getElementById('pdfFrame').src = decodedPath;
  }
})();
</script>

</body>
</html>
