<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>下载 PDF</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e; color: #fff; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 20px;
    }
    .card {
      background: #2a2a4e; border-radius: 16px; padding: 32px 24px;
      width: 100%; max-width: 400px; text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .icon { font-size: 64px; margin-bottom: 20px; }
    .title { font-size: 18px; font-weight: 600; margin-bottom: 8px; color: #fff; }
    .subtitle { font-size: 14px; color: #888; margin-bottom: 28px; line-height: 1.6; }
    .download-btn {
      display: block; width: 100%; background: #4a9eff; color: #fff;
      text-decoration: none; padding: 16px; border-radius: 12px;
      font-size: 17px; font-weight: 600; margin-bottom: 16px;
    }
    .download-btn:hover { background: #3a8eef; }
    .tip { font-size: 12px; color: #666; line-height: 1.8; text-align: left; padding: 16px; background: #1a1a2e; border-radius: 10px; }
    .tip strong { color: #4a9eff; }
  </style>
</head>
<body>

  <div class="card">
    <div class="icon">📄</div>
    <div class="title" id="doc-title">PDF 文档</div>
    <div class="subtitle" id="doc-size"></div>

    <a class="download-btn" id="open-btn" href="#" onclick="openExternal()">
      🔽 用浏览器打开并下载
    </a>

    <div class="tip">
      <strong>操作说明：</strong><br>
      1. 点击上方按钮<br>
      2. 微信会提示「即将打开外部链接」→ 确认<br>
      3. 在 Safari / Chrome / 夸克 等浏览器中打开<br>
      4. 浏览器内可直接预览 PDF，也可点击下载按钮保存
    </div>
  </div>

  <script>
    var urlParams = new URLSearchParams(window.location.search);
    var PDF_URL = urlParams.get('url') || '';
    var PAGE_TITLE = decodeURIComponent(urlParams.get('title') || '文档');

    document.getElementById('doc-title').textContent = PAGE_TITLE;

    // 尝试直接下载（电脑浏览器）
    var dlBtn = document.getElementById('open-btn');
    dlBtn.href = PDF_URL;
    dlBtn.download = PAGE_TITLE + '.pdf';
    dlBtn.target = '_blank';

    // 微信环境检测：如果是微信，引导用外部浏览器打开
    var isWechat = navigator.userAgent.toLowerCase().includes('micromessenger');
    if (isWechat) {
      dlBtn.textContent = '🔽 用浏览器打开并下载';
    }

    // 点击时如果是微信，先尝试跳转外部浏览器
    function openExternal() {
      var isWechat = navigator.userAgent.toLowerCase().includes('micromessenger');
      if (isWechat) {
        // 微信环境：尝试跳转到夸克、QQ等第三方浏览器
        // 使用 universal link / app link 尝试拉起浏览器
        // 如果失败，href 兜底直接下载
        try {
          // iOS 尝试拉起夸克浏览器
          var iframe = document.createElement('iframe');
          iframe.style.display = 'none';
          iframe.src = 'quark://open?url=' + encodeURIComponent(PDF_URL);
          document.body.appendChild(iframe);
          // 如果 0.5 秒没反应，说明没安装夸克，href 兜底
          setTimeout(function() {
            document.body.removeChild(iframe);
          }, 500);
        } catch(e) {}
      }
    }
  </script>

</body>
</html>
