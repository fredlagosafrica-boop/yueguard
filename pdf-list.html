<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>恒玥IFA资料库 - PDF资料中心</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root {
  --gold: #c9a84c;
  --navy: #1e3a5f;
  --bg: #0a1628;
  --card-bg: #111d2e;
  --text: #e8dcc8;
  --text-muted: #8a9bb0;
  --border: rgba(201,168,76,0.15);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 20px;
}
.header {
  text-align: center;
  padding: 20px 0 30px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 30px;
}
.header h1 { font-size: 22px; color: var(--gold); margin-bottom: 8px; }
.header p { color: var(--text-muted); font-size: 14px; }

/* 预览区 */
.preview-panel {
  display: none;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 24px;
}
.preview-panel.active { display: block; }
.preview-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  flex-wrap: wrap;
  gap: 8px;
}
.preview-top h3 { font-size: 16px; color: var(--gold); flex: 1; }
.preview-top .file-info { font-size: 13px; color: var(--text-muted); margin-right: 10px; }
.btn-close {
  background: var(--navy);
  color: var(--text);
  border: none;
  padding: 8px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
}
.btn-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 12px;
}
.btn-row a, .btn-row button {
  padding: 10px 20px;
  border-radius: 8px;
  text-decoration: none;
  font-size: 14px;
  cursor: pointer;
  border: none;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn-preview {
  background: var(--navy);
  color: #fff;
}
.btn-download {
  background: var(--gold);
  color: var(--navy);
  font-weight: bold;
}
#pdfCanvas {
  width: 100%;
  max-height: 70vh;
  border-radius: 8px;
  border: 1px solid var(--border);
  display: block;
  background: #fff;
}

/* 分类筛选 */
.filters {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}
.filter-btn {
  background: var(--card-bg);
  color: var(--text-muted);
  border: 1px solid var(--border);
  padding: 7px 16px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 13px;
  transition: all 0.2s;
}
.filter-btn:hover, .filter-btn.active {
  background: var(--gold);
  color: var(--navy);
  border-color: var(--gold);
}

/* 搜索 */
.search-box {
  margin-bottom: 20px;
}
.search-box input {
  width: 100%;
  padding: 12px 16px;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-size: 15px;
  outline: none;
}
.search-box input:focus { border-color: var(--gold); }

/* PDF卡片 */
.pdf-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}
.pdf-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  cursor: pointer;
  transition: all 0.2s;
}
.pdf-card:hover {
  border-color: var(--gold);
  transform: translateY(-2px);
}
.card-name {
  font-size: 15px;
  font-weight: bold;
  color: var(--gold);
  margin-bottom: 6px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-company {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 4px;
}
.card-size {
  font-size: 12px;
  color: var(--text-muted);
  opacity: 0.7;
}
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
  font-size: 15px;
}
</style>

];

let currentFilter = '全部';
let currentSearch = '';
let currentPdfKey = null;
let currentFilename = '';
let currentAction = 'preview'; // 'preview' or 'download'
let pdfDoc = null;

function formatSize(s) { return s; }

function getCategoryLabel(cat) {
  const map = { '保险公司':'🏢', 'APP操作':'📱', '入职':'📖', '强积金':'🏦', '理赔':'🌀', '合规':'⚖️' };
  return (map[cat] || '📄') + ' ' + cat;
}

function renderList() {
  const grid = document.getElementById('pdfGrid');
  const empty = document.getElementById('emptyState');
  grid.innerHTML = '';

  const filtered = pdfs.filter(p => {
    const matchFilter = currentFilter === '全部' || p.category === currentFilter;
    const matchSearch = !currentSearch || p.name.includes(currentSearch) || p.category.includes(currentSearch);
    return matchFilter && matchSearch;
  });

  if (filtered.length === 0) {
    grid.style.display = 'none';
    empty.style.display = 'block';
    return;
  }
  grid.style.display = 'grid';
  empty.style.display = 'none';

  filtered.forEach(p => {
    const card = document.createElement('div');
    card.className = 'pdf-card';
    card.innerHTML = `
      <div class="card-name">${p.name}</div>
      <div class="card-company">${getCategoryLabel(p.category)}</div>
      <div class="card-size">📦 ${p.size}</div>
    `;
    card.onclick = () => openPreview(p.key, p.name, p.size);
    grid.appendChild(card);
  });
}

function setFilter(cat) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.includes(cat) || (cat === '全部' && b.textContent === '全部'));
  });
  renderList();
}

function filterList() {
  currentSearch = document.getElementById('searchInput').value.trim();
  renderList();
}

// 从URL参数自动打开
(function autoOpen() {
  const params = new URLSearchParams(window.location.search);
  const file = params.get('file');
  const action = params.get('action');
  if (file) {
    const decoded = decodeURIComponent(file);
    const name = decoded.split('/').pop().replace('%2F', '/');
    const fakePdf = pdfs.find(p => p.key === decoded) || { name: name, category: 'PDF', size: '未知' };
    if (action === 'download') {
      downloadFile(decoded, name.split('/').pop());
    } else {
      openPreview(decoded, fakePdf.name, fakePdf.size);
    }
  }
})();


async function openPreview(key, name, size) {
  const panel = document.getElementById('previewPanel');
  const canvas = document.getElementById('pdfCanvas');
  const ctx = canvas.getContext('2d');

  currentPdfKey = key;
  currentFilename = key.split('/').pop();

  currentAction = 'preview';

  document.getElementById('previewTitle').textContent = name;
  document.getElementById('fileInfo').textContent = '📦 ' + size;
  document.getElementById('rawLink').href = RAW_BASE + key;
  document.getElementById('downloadBtn').textContent = '⬇ 下载';
  panel.classList.add('active');
  panel.scrollIntoView({ behavior: 'smooth' });

  // 加载PDF
  if (pdfDoc) { pdfDoc.destroy(); pdfDoc = null; }
  canvas.height = 0;

  try {
    const url = RAW_BASE + key;
    const loadingTask = pdfjsLib.getDocument(url);
    pdfDoc = await loadingTask.promise;
    const page = await pdfDoc.getPage(1);
    const viewport = page.getViewport({ scale: 1.5 });
    canvas.height = viewport.height;
    canvas.width = viewport.width;
    await page.render({ canvasContext: ctx, viewport }).promise;
  } catch (e) {
    canvas.height = 200;
    ctx.fillStyle = '#1e3a5f';
    ctx.fillRect(0, 0, canvas.width, 200);
    ctx.fillStyle = '#c9a84c';
    ctx.font = '16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('PDF加载失败，请点击上方"在新窗口打开"', canvas.width/2, 100);
    console.error('PDF load error:', e);
  }
}

function closePreview() {
  document.getElementById('previewPanel').classList.remove('active');
  if (pdfDoc) { pdfDoc.destroy(); pdfDoc = null; }
  currentPdfKey = null;
}

async function downloadCurrentPdf() {
  if (!currentPdfKey) return;
  downloadFile(currentPdfKey, currentFilename);
}

async function downloadFile(key, filename) {
  const url = RAW_BASE + key;
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error();
    const blob = await res.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
  } catch (e) {
    window.open(url, '_blank');
  }
}

renderList();
</script>
