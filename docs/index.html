<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>恒玥IFA内容库</title>
  <meta name="description" content="恒玥IFA内容库 - 从考牌到展业，每步清晰可查">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-color: #1a7f37;
      --accent-color: #29b45e;
      --bg-color: #f8f9fa;
      --sidebar-width: 260px;
      --text-color: #333;
      --text-light: #666;
      --border-color: #e0e0e0;
      --code-bg: #f4f4f4;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-color);
      color: var(--text-color);
      line-height: 1.7;
    }
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: var(--sidebar-width);
      height: 100vh;
      background: #fff;
      border-right: 1px solid var(--border-color);
      overflow-y: auto;
      z-index: 100;
    }
    .sidebar-header {
      padding: 20px;
      background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
      color: #fff;
    }
    .sidebar-header h1 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .sidebar-header p { font-size: 11px; opacity: 0.85; }
    .sidebar-nav { padding: 12px 0; }
    .nav-section {
      padding: 8px 16px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 12px;
    }
    .nav-section:first-child { margin-top: 0; }
    .nav-item {
      display: block;
      padding: 8px 16px 8px 24px;
      font-size: 13px;
      color: var(--text-color);
      text-decoration: none;
      transition: all 0.2s;
      border-left: 3px solid transparent;
    }
    .nav-item:hover, .nav-item.active {
      background: #f0f7f0;
      color: var(--primary-color);
      border-left-color: var(--primary-color);
    }
    .nav-item.sub { padding-left: 36px; font-size: 12px; }
    .main-content { margin-left: var(--sidebar-width); min-height: 100vh; }
    .top-nav {
      position: sticky;
      top: 0;
      background: #fff;
      border-bottom: 1px solid var(--border-color);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      z-index: 50;
    }
    .breadcrumb { font-size: 12px; color: var(--text-light); }
    .breadcrumb a { color: var(--primary-color); text-decoration: none; }
    .content-wrapper { max-width: 900px; margin: 0 auto; padding: 32px 24px; }
    .doc-header { margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1px solid var(--border-color); }
    .doc-header h1 { font-size: 28px; font-weight: 700; margin-bottom: 12px; }
    .doc-meta { font-size: 12px; color: var(--text-light); }
    .markdown-body { font-size: 15px; line-height: 1.8; }
    .markdown-body h2 { font-size: 22px; font-weight: 600; margin: 36px 0 16px; padding-bottom: 8px; border-bottom: 2px solid var(--primary-color); }
    .markdown-body h3 { font-size: 18px; font-weight: 600; margin: 24px 0 12px; }
    .markdown-body h4 { font-size: 15px; font-weight: 600; margin: 18px 0 10px; }
    .markdown-body p { margin: 12px 0; }
    .markdown-body ul, .markdown-body ol { padding-left: 24px; margin: 12px 0; }
    .markdown-body li { margin: 6px 0; }
    .markdown-body blockquote { background: #f0f7f0; border-left: 4px solid var(--primary-color); padding: 12px 16px; margin: 16px 0; border-radius: 0 6px 6px 0; }
    .markdown-body table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 13px; }
    .markdown-body th, .markdown-body td { padding: 10px 12px; border: 1px solid var(--border-color); text-align: left; }
    .markdown-body th { background: #f5f5f5; font-weight: 600; }
    .markdown-body code { background: var(--code-bg); padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: 13px; }
    .markdown-body a { color: var(--primary-color); text-decoration: none; }
    .doc-footer { margin-top: 48px; padding-top: 24px; border-top: 1px solid var(--border-color); font-size: 12px; color: var(--text-light); display: flex; justify-content: space-between; }
    .menu-toggle { display: none; background: none; border: none; font-size: 20px; cursor: pointer; padding: 4px 8px; }
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.active { transform: translateX(0); }
      .main-content { margin-left: 0; }
      .menu-toggle { display: block; }
    }
  </style>
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1>📚 恒玥IFA内容库</h1>
      <p>IFA必备知识库</p>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
  </aside>
  
  <main class="main-content">
    <nav class="top-nav">
      <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
      <div class="breadcrumb" id="breadcrumb"><a href="#/">首页</a></div>
    </nav>
    <div class="content-wrapper">
      <article class="doc-content">
        <div class="doc-header">
          <h1 id="docTitle">加载中...</h1>
          <div class="doc-meta" id="docMeta"></div>
        </div>
        <div class="markdown-body" id="docContent"></div>
        <div class="doc-footer">
          <span>恒玥 Yuanguard | IFA独立理财顾问服务</span>
          <div style="display:flex;gap:12px">
            <button onclick="adjustFontSize(-1)">字号 -</button>
            <button onclick="adjustFontSize(1)">字号 +</button>
            <button onclick="scrollToTop()">↑ 顶部</button>
          </div>
        </div>
      </article>
    </div>
  </main>
  
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <script>
    window.$docsify = {
      name: '恒玥IFA内容库',
      repo: 'fredlagosafrica-boop/yueguard',
      loadSidebar: '_sidebar',
      subMaxLevel: 4,
      auto2top: true,
      search: { maxAge: 86400000, placeholder: '搜索内容...', noData: '未找到结果' }
    };
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
    function adjustFontSize(delta) {
      const body = document.querySelector('.markdown-body');
      const current = parseInt(window.getComputedStyle(body).fontSize);
      body.style.fontSize = (current + delta) + 'px';
    }
    function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }
  </script>
</body>
</html>
